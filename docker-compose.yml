services:
  indexarr:
    image: ghcr.io/pschmucker/indexarr:latest
    container_name: indexarr
    restart: unless-stopped
    ports:
      - 8787:8787
    volumes:
      - data:/app/data
      # Optional: Mount your media library (read-only recommended)
      - ${MOVIES_PATH}:/data/movies:ro
      - ${TV_SHOWS_PATH}:/data/tv-shows:ro
    environment:
      # User/Group configuration (optional: match your media library owner)
      UID: ${UID:-1000}
      GID: ${GID:-1000}

      # API keys (replace with your actual keys or use .env file)
      TMDB_API_KEY: ${TMDB_API_KEY}
      TVDB_API_KEY: ${TVDB_API_KEY}
      
      # External services
      RADARR_URL: ${RADARR_URL:-http://radarr:7878}
      
      # Scan configuration
      SCAN_INTERVAL: ${SCAN_INTERVAL:-24}
      SCAN_TIMEOUT: ${SCAN_TIMEOUT:-30}
      
      # Timezone (optional, adjust to your location)
      TZ: ${TZ:-UTC}


volumes:
  data:
    name: indexarr-data
    driver: local


networks:
  default:
    name: indexarr
    driver: bridge

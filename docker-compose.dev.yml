services:
  indexarr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indexarr-dev
    restart: unless-stopped
    ports:
      - 8787:8787
    volumes:
      - data:/app/data
      # Optional: Mount your media library (read-only recommended)
      - ${MOVIES_PATH}:/data/movies:ro
      - ${TV_SHOWS_PATH}:/data/tv-shows:ro
    environment:
      # API keys (replace with your actual keys or use .env file)
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TVDB_API_KEY=${TVDB_API_KEY}
      
      # Scan configuration
      - SCAN_INTERVAL=${SCAN_INTERVAL:-24}
      - SCAN_TIMEOUT=${SCAN_TIMEOUT:-30}
      
      # Timezone (optional, adjust to your location)
      - TZ=${TZ:-UTC}


volumes:
  data:
    name: indexarr-data
    driver: local


networks:
  default:
    name: indexarr
    driver: bridge

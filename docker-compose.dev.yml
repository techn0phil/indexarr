services:
  indexarr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: indexarr-dev
    restart: unless-stopped
    ports:
      - 8787:8787
    volumes:
      - data:/app/data
      # Optional: Mount as many media library paths as needed (read-only recommended)
      - ${MOVIES_HOST_PATH:-/host/path/to/movies}:/data/movies:ro
      - ${SERIES_HOST_PATH:-/host/path/to/series}:/data/tv-shows:ro
    environment:
      # Media library paths (optional: comma-separated, adjust as needed)
      MEDIA_LIBRARY_PATHS: /data/movies,/data/tv-shows
      MOVIES_LIBRARY_PATH: /data/movies
      SERIES_LIBRARY_PATH: /data/tv-shows

      # Comma-separated list of folder names to skip during scanning (optional)
      SKIP_FOLDERS: ${SKIP_FOLDERS:-}

      # User/Group configuration (optional: match your media library owner)
      UID: ${UID:-1000}
      GID: ${GID:-1000}

      # API keys (replace with your actual keys or use .env file)
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TVDB_API_KEY: ${TVDB_API_KEY:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      SONARR_API_KEY: ${SONARR_API_KEY:-}

      # External services
      RADARR_URL: ${RADARR_URL:-http://radarr:7878}
      RADARR_PATH_MAPPING: ${RADARR_PATH_MAPPING:-}
      SONARR_URL: ${SONARR_URL:-http://sonarr:8989}
      SONARR_PATH_MAPPING: ${SONARR_PATH_MAPPING:-}

      # Authentication (optional, adjust as needed)
      # AUTH_MODE: ${AUTH_MODE:-disabled} # disabled, local, or oidc
      # For local auth:
      # AUTH_ADMIN_USERNAME: ${AUTH_ADMIN_USERNAME:-admin}
      # AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-admin}
      # AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      # AUTH_SESSION_MAX_AGE: ${AUTH_SESSION_MAX_AGE:-168} # 7 days in hours
      # For OIDC auth:
      # OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      # OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      # OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      # OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      # OIDC_SCOPES: ${OIDC_SCOPES:-openid,profile,email}
      # OIDC_ROLES_CLAIM: ${OIDC_ROLES_CLAIM:-}
      # OIDC_ADMIN_ROLE_VALUE: ${OIDC_ADMIN_ROLE_VALUE:-}
      # OIDC_USERNAME_CLAIM: ${OIDC_USERNAME_CLAIM:-preferred_username}
      # OIDC_AUTO_CREATE_USER: ${OIDC_AUTO_CREATE_USER:-true}
      
      # Scan configuration
      SCAN_INTERVAL: ${SCAN_INTERVAL:-24}
      SCAN_TIMEOUT: ${SCAN_TIMEOUT:-30}
      
      # Timezone (optional, adjust to your location)
      TZ: ${TZ:-UTC}


volumes:
  data:
    name: indexarr-data
    driver: local


networks:
  default:
    name: indexarr
    driver: bridge
